services:
  app:
    build:
      context: .
      args:
        VITE_BASE_PATH: /fastyse/
    container_name: fastyse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EXTERNAL_DB_URL: ${EXTERNAL_DB_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
