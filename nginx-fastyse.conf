    # FastTySE — Agregar este bloque dentro del server HTTPS de tyseapps
    # Ubicación: /etc/nginx/sites-enabled/tyseapps (bloque server listen 8443)
    # Después de agregar: sudo nginx -t && sudo systemctl reload nginx

    # FastTySE - Node.js app (Docker container)
    location /fastyse/ {
        rewrite ^/fastyse(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Uploads (evidencias con imágenes base64)
        client_max_body_size 20m;
    }
